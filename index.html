<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryce M. Gelarden</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fff;
      color: #222;
      line-height: 1.6;
      min-height: 100vh;
    }

    .top-nav {
      background: #fff;
      border-bottom: 1px solid #ccc;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }
    .top-nav a {
      display: inline-block;
      padding: 0.5rem 1rem;
      color: #222;
      text-decoration: none;
      font-size: 1rem;
      border: 1px solid #999;
      background: #fff;
      transition: background 0.2s, color 0.2s;
    }
    .top-nav a:hover {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    .landing {
      padding: 4rem 2rem;
      text-align: center;
      max-width: 960px;
      margin: 0 auto;
    }
    .headshot-wrap {
      display: inline-block;
      padding: 12px;
      background: #e8e8e8;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .landing .headshot-wrap img {
      display: block;
      width: 200px;
      height: 260px;
      object-fit: cover;
      border: 1px solid #ccc;
    }
    .landing h1 {
      font-size: 2.75rem;
      font-weight: normal;
      margin-bottom: 1rem;
      color: #222;
    }
    .tagline-blocks {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .tagline-box {
      background: #f6f6f6;
      border: 1px solid #ddd;
      padding: 1rem 1.25rem;
      text-align: center;
      width: fit-content;
      max-width: 100%;
    }
    .tagline-box p {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.5;
      margin: 0;
      white-space: nowrap;
    }
    .tagline-box.tagline-incoming p {
      font-size: 1rem;
      color: #555;
      font-style: italic;
      white-space: nowrap;
    }
    @media (max-width: 900px) {
      .tagline-box p,
      .tagline-box.tagline-incoming p {
        white-space: normal;
      }
    }
    .tagline-divider {
      height: 1px;
      background: #ccc;
      margin: 0;
      align-self: stretch;
    }
    .landing-extra {
      margin-top: 2rem;
      min-height: 3rem;
      color: #444;
    }
    .landing-logo {
      margin-top: 0.2rem;
      padding-top: 0.35rem;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3rem;
    }
    .landing-logo img {
      height: 48px;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="experience.html">Experience</a></li>
      <li><a href="projects.html">Research/Projects</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="landing">
    <div class="headshot-wrap">
      <img src="Headshot.jpeg" alt="Bryce M. Gelarden">
    </div>
    <h1>Bryce M. Gelarden</h1>
    <div class="tagline-blocks">
      <div class="tagline-box">
        <p>Operations Management, Data Science, Statistics, and Decision Science @ Indiana University</p>
      </div>
      <div class="tagline-divider" aria-hidden="true"></div>
      <div class="tagline-box tagline-incoming">
        <p>Incoming Operations Strategy & Analytics Intern @ United Airlines (Summer 2026)</p>
      </div>
    </div>
    <div class="landing-extra">
      <!-- Room for one other thing -->
    </div>
    <div class="landing-logo">
      <img src="iu_logo.png" alt="Indiana University">
      <img src="united_airlines_logo.png" alt="United Airlines">
    </div>
  </header>
</body>
</html>
